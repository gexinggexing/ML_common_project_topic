hydra:
  run:
    dir: outputs/course_project_optuna_seed42_v1/SEED/mlp/seed42
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.job.chdir=false
    - hydra.run.dir="outputs/course_project_optuna_seed42_v1/SEED/mlp/seed42"
    - hydra.mode=RUN
    task:
    - +task.name="SEED"
    - +task_config_path="src/configs/our_tasks/course_seed_optuna.yaml"
    - +data_root="/mnt/dataset3/panxy/course/project1_data/course project/course project"
    - +ckpt_root="checkpoints"
    - +batch_size=8
    - +skip_test_eval=true
    - +compact_console_logging=true
    - training_mode="mlp"
    - seed=42
    - n_runs=14
    - trainer.device="cuda"
    - loader.num_workers=4
    - loader.pin_memory=true
    - loader.persistent_workers=true
    - mode=train
    - +head_type="mlp"
    - pretrained_path="checkpoints/reve-base"
    - cache_dir=".cache"
    - output_dir="outputs/course_project_optuna_seed42_v1/SEED/mlp/seed42"
  job:
    name: dt_opt
    chdir: false
    override_dirname: +batch_size=8,+ckpt_root="checkpoints",+compact_console_logging=true,+data_root="/mnt/dataset3/panxy/course/project1_data/course
      project/course project",+head_type="mlp",+skip_test_eval=true,+task.name="SEED",+task_config_path="src/configs/our_tasks/course_seed_optuna.yaml",cache_dir=".cache",loader.num_workers=4,loader.persistent_workers=true,loader.pin_memory=true,mode=train,n_runs=14,output_dir="outputs/course_project_optuna_seed42_v1/SEED/mlp/seed42",pretrained_path="checkpoints/reve-base",seed=42,trainer.device="cuda",training_mode="mlp"
    id: ???
    num: ???
    config_name: config_dt
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /mnt/dataset3/nzh/eeg_FM/reve_eeg
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /mnt/dataset3/nzh/eeg_FM/reve_eeg/src/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /mnt/dataset3/nzh/eeg_FM/reve_eeg/outputs/course_project_optuna_seed42_v1/SEED/mlp/seed42
    choices:
      task: _none
      init: cls_wrapper
      encoder: base
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
