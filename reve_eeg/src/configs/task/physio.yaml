name: Physionet MI 4 class
n_chans: 64
duration: 4

classifier:
  n_classes: 4
  dropout: 0.1
  pooling: "no"

data_loader:
  dataset:
    _target_: downstream_tasks.dataloaders.LMDBDataset
    path: ${data_root}/PhysioNet-MI/processed
    electrodes: ['FC5', 'FC3', 'FC1', 'FCz', 'FC2', 'FC4', 'FC6', 'C5', 'C3', 'C1', 'CZ', 'C2', 'C4', 'C6', 'CP5', 'CP3', 'CP1', 'CPz', 'CP2', 'CP4', 'CP6', 'FP1', 'Fpz', 'FP2', 'AF7', 'AF3', 'AFz', 'AF4', 'AF8', 'F7', 'F5', 'F3', 'F1', 'FZ', 'F2', 'F4', 'F6', 'F8', 'FT7', 'FT8', 'T3', 'T4', 'T9', 'T10', 'TP7', 'TP8', 'T5', 'P5', 'P3', 'P1', 'PZ', 'P2', 'P4', 'P6', 'T6', 'PO7', 'PO3', 'POz', 'PO4', 'PO8', 'O1', 'OZ', 'O2', 'Iz']
    scale_factor: 100.0
  batch_size: 32
  seed: ${seed}
  splits: ["train", "val", "test"]

linear_probing:
  n_epochs: 20
  warmup_epochs: 5
  mixup: False
  optimizer:
    _target_: utils.stable_adamw.StableAdamW
    lr: 1e-4
    weight_decay: 1e-2
  patience: 5

fine_tuning:
  n_epochs: 5
  patience: 11
  warmup_epochs: 0
  mixup: False
  dropout: 0.5
  optimizer:
    _target_: utils.stable_adamw.StableAdamW
    lr: 1e-4
    weight_decay: 1e-2

clip: 100
