name: BCIC IV-2a MOABB
n_chans: 22
duration: 4

classifier:
  n_classes: 4
  dropout: 0.3
  pooling: "no"

data_loader:
  dataset:
    _target_: downstream_tasks.dataloader_moabb.MOABBDataset
    _recursive_: False
    dataset_kwargs:
      _target_: moabb.datasets.BNCI2014_001
    electrodes: ['Fz', 'FC3', 'FC1', 'FCz', 'FC2', 'FC4', 'C5', 'C3', 'C1', 'Cz', 'C2', 'C4', 'C6', 'CP3', 'CP1', 'CPz', 'CP2', 'CP4', 'P1', 'Pz', 'P2', 'POz']
    
    scale_factor: 1000.0
    
    # match the paradigm in preprocessing_bciciv2a.py
    paradigm_kwargs:
      # fmin: 0.3
      # fmax: 50.0
      tmin: 2.0
      # MNE includes tmax; 5.996s yields exactly 1000 points at 250 Hz -> 800 after resample(200)
      tmax: 5.996
      resample: 200
    label_map:
      left_hand: 0
      right_hand: 1
      feet: 2
      tongue: 3
    slices:
      train: [0, 5]
      val: [5, 7]
      test: [7, 9]

  batch_size: 64
  seed: ${seed}
  splits: ["train", "val", "test"]

linear_probing:
  n_epochs: 200
  warmup_epochs: 10
  mixup: True
  optimizer:
    _target_: utils.stable_adamw.StableAdamW
    lr: 5e-3
    weight_decay: 1e-3
  patience: 15

fine_tuning:
  n_epochs: 5
  patience: 11
  warmup_epochs: 0
  mixup: True
  dropout: 0.5
  optimizer:
    _target_: utils.stable_adamw.StableAdamW
    lr: 1e-4
    weight_decay: 1e-2

clip: 100
