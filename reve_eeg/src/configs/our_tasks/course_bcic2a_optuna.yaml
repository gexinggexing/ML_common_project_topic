name: BCIC2A
n_chans: 22
duration: 4

classifier:
  n_classes: 4
  pooling: "last"
  head_type: ${oc.select:head_type,linear}
  mlp_hidden_dim: optuna:categorical:512:256:512:768
  dropout: optuna:float:0.10:0.05:0.35

data_loader:
  dataset:
    _target_: downstream_tasks.dataloader_course_h5.CourseH5Dataset
    path: ${data_root}/BCIC2A
    dataset_name: BCIC2A
    ckpt_root: ${ckpt_root}
    normalize: true
    cache_in_memory: false
    resample_to_200hz: false
  batch_size: ${oc.select:batch_size,16}
  seed: ${oc.select:seed,42}
  splits: ["train", "val"]

linear_probing:
  n_epochs: 30
  patience: 8
  warmup_epochs: 0
  mixup: false
  batch_size: ${oc.select:batch_size,16}
  optimizer:
    lr: optuna:float:0.001:0.0003:0.003:log
    weight_decay: optuna:float:0.0001:1.0e-06:0.01:log
  scheduler:
    patience: 4

mlp_probing:
  n_epochs: 30
  patience: 8
  warmup_epochs: 0
  mixup: false
  batch_size: ${oc.select:batch_size,16}
  optimizer:
    lr: optuna:float:0.0007:0.0002:0.002:log
    weight_decay: optuna:float:0.0001:1.0e-06:0.01:log
  scheduler:
    patience: 4

fine_tuning:
  n_epochs: 20
  patience: 6
  warmup_epochs: 0
  mixup: false
  batch_size: ${oc.select:batch_size,16}
  encoder_lr: optuna:float:1.0e-05:2.0e-06:2.0e-05:log
  head_lr: optuna:float:1.0e-04:5.0e-05:5.0e-04:log
  optimizer:
    lr: 1.0e-04
    weight_decay: optuna:float:0.0001:1.0e-06:0.01:log
  scheduler:
    patience: 3

clip: 100
